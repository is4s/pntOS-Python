    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync --python 3.13
        - docker exec pntos-python pytest pntos-cobra --cov --cov-fail-under=75 --cov-report={term,html}  --cov-config=.coveragerc

ASPN-ROS Test:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync --python 3.12  # 3.12 for Jazzy compatibility
        - docker exec pntos-python git clone --depth 1 -b main git@git.aspn.us:pntos/firehose-outputs.git
        - docker exec pntos-python bash -c "cd firehose-outputs &&
                                            git fetch --depth 1 origin $FIREHOSE_OUTPUTS_VERSION &&
                                            git checkout $FIREHOSE_OUTPUTS_VERSION"
        - docker exec pntos-python bash -c ". firehose-outputs/ros_devel/jazzy/setup.bash &&
                                            pytest pntos-cobra/tests/test_aspn_ros.py"

