---
workflow:
  rules:
  # Never run merge request pipelines
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: never
  # Only run on git.aspn.us
  - if: $CI_SERVER_HOST == "git.aspn.us"

variables:
  GIT_CLEAN_FLAGS: -xdff
  UV_INDEX: https://gitlab-ci-token:${CI_JOB_TOKEN}@git.aspn.us/api/v4/projects/94/packages/pypi/simple
  FIREHOSE_OUTPUTS_VERSION: d051b108d4c68e648ed551356ad7ddc1b76b99e1  # main, July 28, 2025

default:
    retry:
      max: 2 # (2 retry maximum, up to 3 runs in total)
      when: runner_system_failure
      exit_codes: 128
    before_script:

        # Clone only if empty directory
        - |
            if ! [ "$(ls -A)" ]; then
                git clone $CI_REPOSITORY_URL .
            fi
        - git remote set-url origin $CI_REPOSITORY_URL
        - git --no-optional-locks fetch --prune
        - git reset --hard "$CI_COMMIT_SHA"
        - git clean "$GIT_CLEAN_FLAGS" || true

        # If this is a branch pipeline, attempt to merge with master/target branch, but keep going
        # if it fails.
        - |
            if [[ ! -z "${CI_COMMIT_BRANCH}" ]]; then
                git merge origin/"${TARGET_BRANCH:-$CI_DEFAULT_BRANCH}" || true
                git reset --hard
                git clean "$GIT_CLEAN_FLAGS"
            fi

        # Grab URL with CI token, which is of the form:
        # https://gitlab-ci-token:[MASKED]@git.aspn.us/pntos/pntos.git
        - export TOKEN_URL="$(echo $CI_REPOSITORY_URL | sed -E 's/(.*git.aspn.us\/).*/\1/g')"

        # Build docker container
        - docker pull ros:jazzy-ros-base
        - export DOCKER_IMAGE="$LOCAL_REGISTRY_CACHE/pntos-python"
        - docker build --cache-from $DOCKER_IMAGE --build-arg BUILDKIT_INLINE_CACHE=1 --build-arg TOKEN_URL=$TOKEN_URL -t $DOCKER_IMAGE - < Dockerfile
        - docker push $DOCKER_IMAGE

stages:
    - check
    - run
    - deploy

ruff check:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE "uv sync && ruff check"

ruff format:
    stage: check
    tags:
        - linux-light-runner
    script:
        # Run the formatter to see if it produces a diff.
        - docker run --rm -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE "uv sync && ruff format"
        # If there's a diff, fail the stage.
        - git diff --exit-code

pyproject format:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        # Run the formatter to see if it produces a diff.
        - docker exec pntos-python uv sync
        - docker exec pntos-python pyproject-fmt pyproject.toml --column-width 88 --indent 4
        - docker exec pntos-python pyproject-fmt pntos-api/pyproject.toml --column-width 88 --indent 4
        - docker exec pntos-python pyproject-fmt pntos-cobra/pyproject.toml --column-width 88 --indent 4
        # If there's a diff, fail the stage.
        - git diff --exit-code

app and orchestration synchronization:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync
        # Run sync check script
        - util/check_sync.sh

API Synchronization:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync
        # Run api sync check script
        - docker exec pntos-python util/api_synchronization/compare_apis.py

requirements up-to-date:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        # Generate uv.lock
        - docker exec pntos-python uv sync
        # Generate requirements*.txt files
        - docker exec pntos-python uv export --frozen --no-dev --no-hashes -o requirements-minimal.txt
        - docker exec pntos-python uv export --frozen --no-hashes -o requirements.txt
        # If there's still a diff, then there's unsynced changes; fail the job.
        - git diff --exit-code

Python 3.10 Test:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync
        - docker exec pntos-python pytest pntos-cobra --cov --cov-fail-under=75 --cov-report={term,html}  --cov-config=.coveragerc
    coverage:
        '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
    artifacts:
      paths:
        - htmlcov/*

