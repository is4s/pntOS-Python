        - docker exec pntos-python uv sync
        - docker exec pntos-python mypy pntos-api --no-implicit-reexport
        - docker exec pntos-python mypy pntos-cobra --no-implicit-reexport
        - docker exec pntos-python mypy apps/advanced/ --no-implicit-reexport
        - docker exec pntos-python mypy apps/standard/ --no-implicit-reexport
        - docker exec pntos-python mypy apps/tutorial/ --no-implicit-reexport

documentation check:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync
        # Build the documentation
        - docker exec -e TZ=UTC pntos-python sphinx-build --exception-on-warning docs/ docs/build/
    artifacts:
        expose_as: "documentation"
        paths:
        - docs/build/index.html  # must be first, expose_as links to the first entry
        - docs/build # ..but all the other files *also* need to be in the archive

link check:
    stage: check
    tags:
        - linux-light-runner
    script:
