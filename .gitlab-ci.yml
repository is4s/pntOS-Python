pip workflow check:
    stage: run
    needs: []
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/pip --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python python3 -m venv /work/.venv
        - docker exec pntos-python .venv/bin/pip install -v -r requirements.txt --extra-index-url=${UV_INDEX}
        - docker exec pntos-python postprocessing/run_app_and_record_data.py

minimal pip workflow check:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/pip --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python python3 -m venv /work/.venv
        - docker exec pntos-python .venv/bin/pip install -v -r requirements-minimal.txt --extra-index-url=${UV_INDEX}
        - docker exec pntos-python python3 -c "import pntos.cobra; import pntos.api"

copyright year check:
    stage: check
    tags:
        - linux-light-runner
    allow_failure: true
    script:
        - (! grep --color -i "copyright.*$(( $(date +%Y) - 1 ))" $(git ls-files))

build wheels:
    stage: check
    tags:
        - linux-light-runner
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python uv sync
        - docker exec pntos-python uv build pntos-api
        - docker exec pntos-python uv build pntos-cobra
    artifacts:
        paths:
            - dist/pntos*.whl

pages:
    stage: deploy
    tags: [linux-light-runner]
    before_script: []
    script:
        - rm -rf public
        - mkdir -p public
        - cp -r docs/build/* public
    needs:
        - documentation check
    only:
        - main
    artifacts:
        paths:
            - public

deploy wheels:
    stage: deploy
    tags:
        - linux-light-runner
    only:
        - main
    needs:
        - build wheels
    variables:
        # Don't clean artifacts from previous job
        GIT_CLEAN_FLAGS: -f
    script:
        - docker run --rm -dit -v $(pwd):/work -v $HOME/.ccache:/root/.cache/uv --name pntos-python -e UV_INDEX=${UV_INDEX} $DOCKER_IMAGE bash
        - docker exec pntos-python python3 -m venv /work/.venv
        - docker exec pntos-python .venv/bin/pip install twine==6.1.0
        - export REPO_URL=${CI_API_V4_URL}/projects/94/packages/pypi
        - docker exec pntos-python twine upload
            --repository-url ${REPO_URL}
            --username gitlab-ci-token
            --password ${CI_JOB_TOKEN}
            --skip-existing
            dist/pntos*.whl
