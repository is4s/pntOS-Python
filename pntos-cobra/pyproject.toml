[project]
name = "pntos-cobra"
version = "0.1.0"
description = "A Python implementation of a set of pntOS example plugins."
authors = [
    { name = "IS4S", email = "pntos@is4s.com" }
]
dependencies = [
    "numpy>=1.26.4",
    "pntos-api>=0.1.0",
    "lcm @ git+https://github.com/lcm-proj/lcm.git@master#subdirectory=lcm-python"
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
