[project]
name = "pntos-cobra"
version = "0.1.0"
description = "A Python implementation of a set of pntOS example plugins."
authors = [{ name = "IS4S", email = "pntos@is4s.com" }]
dependencies = [
    # numpy < 2.0 does not have wheel for Python 3.13. numpy 2.2 type errors with Cobra (#148).
    "numpy==2.1.3",
    "scipy>=1.15.2",
    "pntos-api>=0.1.0",
    "h5py>1.0.0",
    "lcm==1.5.1",
    # firehose-outputs main branch - committed 19 March 2025
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@f5f5b2b4637517bb10299fb6be7248a2215fbb74#subdirectory=aspn-py",
    "aspn23_lcm @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@f5f5b2b4637517bb10299fb6be7248a2215fbb74#subdirectory=lcm/python",
    # lcm-generated master branch - committed 25 July 2024
    "aspn_lcm @ git+ssh://git@git.aspn.us/pntos/lcm-generated.git@21e03f8765605dcd3c8d8d6bb7091ebeef24ee23#subdirectory=python",
    # Generated from commit 2d65da3693e7087a0e9ae56db6eba900c9e7ea91 on 8 May 2025
    "navtk==2.1.0.post2.dev0",
    # Generated from branch v2 on 21 May 2025
    "pntos-python-datasets==0.2.0",
]
readme = "README.md"
requires-python = ">= 3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
