[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "pntos-cobra"
version = "0.1.0.dev0"
description = "A Python implementation of a set of pntOS example plugins."
readme = "README.md"
authors = [ { name = "IS4S", email = "pntos@is4s.com" } ]
requires-python = ">=3.10"

classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "analysis-lcm @ git+ssh://git@git.aspn.us/pntos/analysis-scripts.git@69c8f1b9336df140d5835f5ccd0a684aa4e29465#subdirectory=analysis-lcm",
    "analysis-ros @ git+ssh://git@git.aspn.us/pntos/analysis-scripts.git@69c8f1b9336df140d5835f5ccd0a684aa4e29465#subdirectory=analysis-ros",

    # lcm-generated master branch - committed 19 June 2025
    "aspn-lcm @ git+ssh://git@git.aspn.us/pntos/lcm-generated.git@14045fe000e4395bf81708e963aea09948e52949#subdirectory=python",
    # firehose-outputs main branch - committed 15 July 2025
    "aspn2-translations @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@9e2a4f463ff4288bd40098ebf775304966a76393#subdirectory=aspn2_to_aspn_py_translations",
    # firehose-outputs main branch - committed 12 June 2025
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@d425e26330e62371038f14ad12a8d8b4374698a6#subdirectory=aspn-py",
    # firehose-outputs main branch - committed 26 June 2025
    "aspn23-lcm @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@50b596d2c349ceb98b60ab6aecc91961424bcec8#subdirectory=lcm/python",
    "h5py>1",
    "lcm==1.5.1",
    "matplotlib",
    # Generated from commit 2d65da3693e7087a0e9ae56db6eba900c9e7ea91 on 8 May 2025
    "navtk==2.1.post3.dev0",
    # numpy 2.2 type errors with Cobra (#148).
    "numpy!=2.2",
    "pntos-api==0.1.dev0",
    "scipy>=1.15.2",
    "tqdm",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = [ "src/pntos" ]

[[tool.uv.index]]
url = "https://git.aspn.us/api/v4/projects/94/packages/pypi/simple"
