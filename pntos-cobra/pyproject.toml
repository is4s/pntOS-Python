[project]
name = "pntos-cobra"
version = "0.1.0"
description = "A Python implementation of a set of pntOS example plugins."
authors = [
    { name = "IS4S", email = "pntos@is4s.com" }
]
# Git dependencies need exact commit hash for pip compatibility,
# see https://github.com/astral-sh/rye/issues/957
dependencies = [
    "numpy>=1.26.4",
    "pntos-api>=0.1.0",
    # LCM master branch - committed 24 October 2024
    "lcm @ git+https://github.com/lcm-proj/lcm.git@8d638bb3aeae39fda5db59f43b85f3a4b3f9a6ac",
    # firehose-outputs main branch - committed 18 November 2024
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@0f42a18e9c3a65462d10686eced7bb3e0f51eae8#subdirectory=aspn-py",
    "aspn23_lcm @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@0f42a18e9c3a65462d10686eced7bb3e0f51eae8#subdirectory=lcm/python",
    # lcm-generated master branch - committed 25 July 2024
    "aspn_lcm @ git+ssh://git@git.aspn.us/pntos/lcm-generated.git@21e03f8765605dcd3c8d8d6bb7091ebeef24ee23#subdirectory=python",
    # NavToolkit base/workspace branch - committed 31 December 2024
    "navtk @ git+ssh://git@git.aspn.us/pntos/navtk.git@b6729eda4fe5f8d9013f79d25ddce3e1b940b594",
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
