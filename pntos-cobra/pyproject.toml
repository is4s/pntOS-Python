[project]
name = "pntos-cobra"
version = "0.1.0"
description = "A Python implementation of a set of pntOS example plugins."
authors = [{ name = "IS4S", email = "pntos@is4s.com" }]
# Git dependencies need exact commit hash for pip compatibility,
# see https://github.com/astral-sh/rye/issues/957
dependencies = [
    "numpy>=1.26.4",
    "scipy>=1.15.2",
    "pntos-api>=0.1.0",
    "h5py>1.0.0",
    "lcm==1.5.1",
    # firehose-outputs main branch - committed 19 March 2025
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@f5f5b2b4637517bb10299fb6be7248a2215fbb74#subdirectory=aspn-py",
    "aspn23_lcm @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@f5f5b2b4637517bb10299fb6be7248a2215fbb74#subdirectory=lcm/python",
    # lcm-generated master branch - committed 25 July 2024
    "aspn_lcm @ git+ssh://git@git.aspn.us/pntos/lcm-generated.git@21e03f8765605dcd3c8d8d6bb7091ebeef24ee23#subdirectory=python",
    # NavToolkit base/workspace_v3 branch - committed 7 May 2025
    "navtk @ git+ssh://git@git.aspn.us/pntos/navtk.git@d0638e1527f8341d8bb51b9c080c2f97e11d982a",
    # pntos-python-datasets main branch - committed 10 April 2025
    "pntos-python-datasets @ git+ssh://git@git.aspn.us/pntos/pntos-python-datasets.git@64b88705a2bb762ec618b9960229986120d000b9",
]
readme = "README.md"
requires-python = ">= 3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
