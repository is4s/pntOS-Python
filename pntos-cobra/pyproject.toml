[project]
name = "pntos-cobra"
version = "0.1.0"
description = "A Python implementation of a set of pntOS example plugins."
authors = [
    { name = "IS4S", email = "pntos@is4s.com" }
]
# Git dependencies need exact commit hash for pip compatibility,
# see https://github.com/astral-sh/rye/issues/957
dependencies = [
    "numpy>=1.26.4",
    "pntos-api>=0.1.0",
    "lcm>=1.5.0",
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@e720a212cf5a3b18ab61cc084dcd62f2a48f2f51#subdirectory=aspn-py",
    "aspn_lcm @ git+ssh://git@git.aspn.us/pntos/lcm-generated.git@21e03f8765605dcd3c8d8d6bb7091ebeef24ee23#subdirectory=python",
    "aspn23_lcm @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@e720a212cf5a3b18ab61cc084dcd62f2a48f2f51#subdirectory=lcm/python"
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
