[project]
name = "pntos-api"
version = "0.1.0.dev0"
description = "The API specification for pntOS, ported into pure Python."
authors = [{ name = "IS4S", email = "pntos@is4s.com" }]
dependencies = [
    "numpy",
    # firehose-outputs main branch - committed 12 June 2025
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@d425e26330e62371038f14ad12a8d8b4374698a6#subdirectory=aspn-py",
]
readme = "README.md"
requires-python = ">= 3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
