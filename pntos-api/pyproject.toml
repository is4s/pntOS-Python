[project]
name = "pntos-api"
version = "0.1.0"
description = "The API specification for pntOS, ported into pure Python."
authors = [
    { name = "IS4S", email = "pntos@is4s.com" }
]
dependencies = [
    # firehose-outputs main branch - committed 18 November 2024
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@0f42a18e9c3a65462d10686eced7bb3e0f51eae8#subdirectory=aspn-py",
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
