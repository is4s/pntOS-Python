[project]
name = "pntos-api"
version = "0.1.0"
description = "The API specification for pntOS, ported into pure Python."
authors = [
    { name = "IS4S", email = "pntos@is4s.com" }
]
dependencies = [
    # firehose-outputs main branch - committed 19 March 2025
    "aspn23 @ git+ssh://git@git.aspn.us/pntos/firehose-outputs.git@f5f5b2b4637517bb10299fb6be7248a2215fbb74#subdirectory=aspn-py",
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pntos"]
