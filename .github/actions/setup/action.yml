name: 'Set up Docker'
description: >
  Pulls docker image from registry, or builds if not available.
  Then spins up docker container and runs uv sync with caching.
runs:
  using: "composite"
  steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Compute Dockerfile hash
      id: dockerfile-hash
      shell: bash
      run: |
        HASH=$(sha256sum Dockerfile | cut -d' ' -f1 | cut -c1-12)
        echo "hash=$HASH" >> $GITHUB_OUTPUT
        echo "Dockerfile hash: $HASH"

    - name: Convert owner to lowercase
      id: repo
      shell: bash
      run: |
        echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Try to pull Docker image from registry
      id: pull
      shell: bash
      continue-on-error: true
      run: docker pull ghcr.io/${{ steps.repo.outputs.owner }}/pntos-python:pntos-python-${{ steps.dockerfile-hash.outputs.hash }}

    - name: Set up Docker Buildx
      if: steps.pull.outcome == 'failure'
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      if: steps.pull.outcome == 'failure'
      id: docker_build
      uses: docker/build-push-action@v5
      with:
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.owner }}/pntos-python:pntos-python-${{ steps.dockerfile-hash.outputs.hash }}
      env:
        SOURCE_DATE_EPOCH: 0

    - name: Pull image after build
      if: steps.pull.outcome == 'failure'
      shell: bash
      run: docker pull ghcr.io/${{ steps.repo.outputs.owner }}/pntos-python:pntos-python-${{ steps.dockerfile-hash.outputs.hash }}

    - name: Retag image
      shell: bash
      run: docker tag ghcr.io/${{ steps.repo.outputs.owner }}/pntos-python:pntos-python-${{ steps.dockerfile-hash.outputs.hash }} pntos-python

    - name: Ensure cache directory exists
      shell: bash
      run: mkdir -p ~/.cache

    - name: Restore uv cache before syncing
      if: inputs.sync == 'true'
      uses: actions/cache/restore@v4
      with:
        path: ~/.cache
        key: uv-cache-${{ inputs.python }}-${{ hashFiles('uv.lock') }}
        restore-keys: uv-cache-${{ inputs.python }}-

    - name: Spin up docker container
      shell: bash
      run: docker run --rm -dit -v $(pwd):/work -v ~/.cache:/root/.cache/uv --name pntos-python pntos-python bash

    - name: uv sync
      if: inputs.sync == 'true'
      shell: bash
      run: |
        set -xe
        if [ "${{ inputs.python }}" != "default" ]; then
          docker exec pntos-python uv sync --python ${{ inputs.python }}
        else
          docker exec pntos-python uv sync
        fi

    - name: Save uv cache
      if: inputs.sync == 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.cache
        key: uv-cache-${{ inputs.python }}-${{ hashFiles('uv.lock') }}

inputs:
  python:
    description: 'Python version to use instead of the one pinned in .python-version'
    required: false
    default: default
  sync:
    description: 'Selects whether or not to run uv sync'
    required: false
    default: true
