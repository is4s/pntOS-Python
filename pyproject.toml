[project]
name = "pntos-python"
version = "0.1.0.dev0"
description = "A meta package for pntOS that contains the components of pntOS."
readme = "README.md"
authors = [ { name = "IS4S", email = "pntos@is4s.com" } ]
requires-python = ">=3.10"

classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "analysis-lcm @ git+ssh://git@git.aspn.us/pntos/analysis-scripts.git@6a457e6db086d3325b52a2ec5d379ece2a9c2c64#subdirectory=analysis-lcm",
    "analysis-ros @ git+ssh://git@git.aspn.us/pntos/analysis-scripts.git@6a457e6db086d3325b52a2ec5d379ece2a9c2c64#subdirectory=analysis-ros",
    "matplotlib",
    "pntos-api",
    "pntos-cobra",
    # Generated from branch v0.4.3 on 1 December 2025
    "pntos-python-datasets==0.4.3",
]

[dependency-groups]
dev = [
    "gitpython>=3.1.44",
    "ipython>=8.24",
    "libclang>=18.1.1",
    "mypy==1.18.2",
    "myst-parser>=4",
    "pip>=24",
    # Generated from commit a44dac604ec22c200e092e65dfe0d62cb9fe32c3 on 19 May 2025
    "pntos-python-docs-data==0.1.5",
    "pyproject-fmt>=2.7",
    "pytest>=8.2",
    "pytest-cov>=6",
    "ruff==0.13.2",
    "sphinx>=7.3.7",
    "sphinx-copybutton",
    "sphinx-design",
    "sphinx-rtd-theme>=3.0.2",
]

[tool.ruff]
format.quote-style = "single"
lint.select = [
    "ANN",
    "B",
    "BLE",
    "C4",
    "COM",
    "D",
    "DTZ",
    "E",
    "F",
    "FA",
    "FLY",
    "FURB",
    "G",
    "I",
    "ICN",
    "INT",
    "LOG",
    "NPY",
    "PERF",
    "PGH",
    "PIE",
    "PL",
    "PTH",
    "RET",
    "RSE",
    "RUF",
    "SIM",
    "SLOT",
    "T10",
    "TID",
    "UP",
    "W",
]
lint.ignore = [ "COM812", "D212", "D417", "E501", "PLR0911", "PLR0912", "PLR0913" ]
lint.per-file-ignores."*/tests/*" = [
    "ANN001",
    "B008",
    "D100",
    "D101",
    "D102",
    "D107",
    "NPY",
    "PGH003",
    "PLC0415",
    "PLR0915",
    "PLR2004",
    "PLW0602",
    "PLW0603",
]
lint.per-file-ignores."apps/*" = [ "D" ]
lint.per-file-ignores."docs/*" = [ "D" ]
lint.per-file-ignores."internal.py" = [ "PLC0414" ]
lint.per-file-ignores."pntos-api/*" = [ "PIE" ]
lint.per-file-ignores."pntos-cobra/*" = [ "D" ]
lint.per-file-ignores."postprocessing/*" = [ "D" ]
lint.isort.combine-as-imports = true
lint.pydocstyle.convention = "google"

[tool.pytest.ini_options]
addopts = "-p no:launch_ros -p no:launch_testing"

[tool.mypy]
strict = true
disable_error_code = [ "import-untyped", "no-untyped-call" ]
warn_unreachable = true

[[tool.mypy.overrides]]
module = "pntos.cobra.tutorial_plugins.TutorialGpsOrchestrationPlugin,pntos.cobra.tutorial_plugins.TutorialGpsVelOrchestrationPlugin"
ignore_errors = true

[tool.uv]
package = false

[tool.uv.workspace]
members = [ "pntos-api", "pntos-cobra" ]

[[tool.uv.index]]
url = "https://git.aspn.us/api/v4/projects/94/packages/pypi/simple"
cache-control = { api = "max-age=600", files = "max-age=365000000, immutable" }

[tool.uv.sources]
pntos-api = { workspace = true }
pntos-cobra = { workspace = true }
